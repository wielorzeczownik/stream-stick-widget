name: Bug report
description: Something is not working correctly
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Before reporting, check if the issue already exists in [open issues](https://github.com/wielorzeczownik/stream-stick-widget/issues).

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Streaming platform
      options:
        - Twitch
        - YouTube
        - Kick
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "e.g. v0.1.0"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output from the browser console.
      render: text
